name: Release

on:
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'main.js'
      - 'control-center-preload.js'
      - 'renderer.js'
      - 'preload.js'
      - 'src/**'
      - 'tests/**'
      - 'build/**'
      - '.github/workflows/release.yml'
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'GitHub Release tag to upload assets to'
        required: true
        default: 'v1.0.1-rc.1'
      checkout_ref:
        description: 'Git ref to build from'
        required: true
        default: 'v1.0.1-rc.1'

jobs:
  test-build:
    if: github.event_name == 'pull_request'
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Check syntax
        run: npm run check:syntax

      - name: Pack unsigned app
        run: npm run pack

  release:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.checkout_ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Check syntax
        run: npm run check:syntax

      - name: Resolve release metadata
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "tag=$INPUT_RELEASE_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Inspect signing secrets
        id: signing
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=""
          test -n "$CSC_LINK" || missing="$missing CSC_LINK"
          test -n "$CSC_KEY_PASSWORD" || missing="$missing CSC_KEY_PASSWORD"
          test -n "$APPLE_ID" || missing="$missing APPLE_ID"
          test -n "$APPLE_APP_SPECIFIC_PASSWORD" || missing="$missing APPLE_APP_SPECIFIC_PASSWORD"
          test -n "$APPLE_TEAM_ID" || missing="$missing APPLE_TEAM_ID"

          if [ -z "$missing" ]; then
            echo "mode=signed" >> "$GITHUB_OUTPUT"
            echo "All signing and notarization secrets are present. Building a signed macOS release."
          else
            echo "mode=unsigned" >> "$GITHUB_OUTPUT"
            echo "::notice::Missing signing secrets:$missing. Building an unsigned macOS release."
          fi

      - name: Build signed distribution
        if: steps.signing.outputs.mode == 'signed'
        run: npm run dist -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build unsigned distribution
        if: steps.signing.outputs.mode == 'unsigned'
        run: npm run dist -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          files: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest*.yml
          overwrite_files: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openpet-macos-${{ steps.release.outputs.tag }}
          path: |
            release/*.dmg
            release/*.zip
            release/latest*.yml
          if-no-files-found: error
